<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Platform - 개발자 도구 모음</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; padding: 3rem 0; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; font-size: 1.1rem; }
        .search-box { max-width: 600px; margin: 2rem auto; }
        .search-box input { width: 100%; padding: 1rem 1.5rem; font-size: 1.1rem; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: #f1f5f9; outline: none; transition: border-color 0.2s; }
        .search-box input:focus { border-color: #60a5fa; }
        .categories { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 1.5rem 0; }
        .category-btn { padding: 0.5rem 1rem; border: 1px solid #334155; border-radius: 20px; background: transparent; color: #94a3b8; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .category-btn:hover, .category-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .results { display: grid; gap: 1rem; margin-top: 2rem; }
        .service-card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; transition: transform 0.2s, border-color 0.2s; }
        .service-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
        .service-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem; }
        .service-name { font-size: 1.2rem; font-weight: 600; color: #f1f5f9; }
        .service-name a { color: inherit; text-decoration: none; }
        .service-name a:hover { color: #60a5fa; }
        .service-category { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 12px; background: #334155; color: #94a3b8; }
        .service-description { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.75rem; }
        .service-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .tag { font-size: 0.8rem; padding: 0.25rem 0.5rem; border-radius: 6px; background: #0f172a; color: #60a5fa; }
        .bookmark-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
        .bookmark-btn:hover, .bookmark-btn.active { color: #fbbf24; }
        .stats { text-align: center; color: #64748b; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #1e293b; }
        .no-results { text-align: center; color: #64748b; padding: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DevTools Platform</h1>
            <p class="subtitle">무료 개발자 도구를 한눈에 찾아보세요</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (예: CI/CD, AI, DB...)">
        </div>
        
        <div class="categories">
            <button class="category-btn active" data-category="all">전체</button>
            <button class="category-btn" data-category="AI/ML">AI/ML</button>
            <button class="category-btn" data-category="CI/CD">CI/CD</button>
            <button class="category-btn" data-category="Database">Database</button>
            <button class="category-btn" data-category="CDN">CDN</button>
            <button class="category-btn" data-category="Cloud">Cloud</button>
            <button class="category-btn" data-category="API">API</button>
            <button class="category-btn" data-category="Monitoring">Monitoring</button>
            <button class="category-btn" data-category="Security">Security</button>
        </div>
        
        <div id="results" class="results"></div>
        
        <div class="stats">
            <span id="resultCount"></span>개 서비스
        </div>
    </div>
    
<script>
const services = [
    {"name": "GitHub", "category": "CI/CD", "url": "https://github.com", "description": "무료 private 저장소, GitHub Actions 포함. 오픈소스 프로젝트와 교육용 무료.", "tags": ["git", "ci/cd", "collaboration"]},
    {"name": "HuggingFace", "category": "AI/ML", "url": "https://huggingface.co", "description": "오픈소스 AI 모델 허브. 자연어 처리, 컴퓨터 비전 등 무료 AI 모델 제공.", "tags": ["ai", "ml", "nlp"]},
    {"name": "Vercel", "category": "CI/CD", "url": "https://vercel.com", "description": "프론트엔드 배포 플랫폼. Next.js, React 등 정적/서버리스 앱 무료 배포.", "tags": ["hosting", "serverless", "frontend"]},
    {"name": "MongoDB Atlas", "category": "Database", "url": "https://www.mongodb.com/atlas", "description": "클라우드 MongoDB. 512MB 무료 스토리지, 완전 관리형 DB 서비스.", "tags": ["mongodb", "nosql", "cloud"]},
    {"name": "PostgreSQL", "category": "Database", "url": "https://www.postgresql.org", "description": "오픈소스 관계형 데이터베이스. 강력한 기능과 확장성.", "tags": ["sql", "database", "open-source"]},
    {"name": "Cloudflare", "category": "CDN", "url": "https://cloudflare.com", "description": "CDN, DNS, DDoS 보호. 무제한 DDoS 보호와 CDN 무료 tier 제공.", "tags": ["cdn", "dns", "security"]},
    {"name": "Sentry", "category": "Monitoring", "url": "https://sentry.io", "description": "애플리케이션 모니터링 및 에러 추적. 5K 이벤트/월 무료.", "tags": ["monitoring", "error-tracking", "debugging"]},
    {"name": "Datadog", "category": "Monitoring", "url": "https://www.datadoghq.com", "description": "클라우드 인프라 모니터링. 5호스트 무료 모니터링 제공.", "tags": ["monitoring", "metrics", "logs"]},
    {"name": "Stripe", "category": "API", "url": "https://stripe.com", "description": "결제 API. 테스트 모드 무료, 프로덕션 시 수수료 부과.", "tags": ["payment", "api", "ecommerce"]},
    {"name": "Twilio", "category": "API", "url": "https://www.twilio.com", "description": "커뮤니케이션 API. SMS, 음성, 비디오 API 제공.", "tags": ["sms", "voice", "api"]},
    {"name": "Auth0", "category": "Security", "url": "https://auth0.com", "description": "인증/인가 플랫폼. 7,000 무료 활성 사용자 제공.", "tags": ["auth", "identity", "security"]},
    {"name": "Snyk", "category": "Security", "url": "https://snyk.io", "description": "보안 스캐닝. 오픈소스 의존성 취약점 스캔 무료.", "tags": ["security", "vulnerability", "scanning"]},
    {"name": "Docker Hub", "category": "CI/CD", "url": "https://hub.docker.com", "description": "컨테이너 레지스트리. 무료 공개 저장소 무제한.", "tags": ["docker", "container", "registry"]},
    {"name": "GitLab", "category": "CI/CD", "url": "https://gitlab.com", "description": "GitHub 대안. 무제한 무료 저장소와 CI/CD.", "tags": ["git", "ci/cd", "devops"]},
    {"name": "Supabase", "category": "Database", "url": "https://supabase.com", "description": "Firebase 대안. Postgres DB, 인증, 스토리지 무료 tier.", "tags": ["database", "auth", "realtime"]},
    {"name": "Firebase", "category": "Database", "url": "https://firebase.google.com", "description": "Google의 앱 개발 플랫폼. 인증, 데이터베이스, 호스팅 무료 tier.", "tags": ["baas", "auth", "database"]},
    {"name": "Netlify", "category": "CI/CD", "url": "https://netlify.com", "description": "정적 사이트 배포. 100GB 대역폭 무료.", "tags": ["hosting", "cdn", "serverless"]},
    {"name": "Railway", "category": "CI/CD", "url": "https://railway.app", "description": "모던 앱 배포. 월 $5 무료 크레딧.", "tags": ["hosting", "database", "deploy"]},
    {"name": "Render", "category": "CI/CD", "url": "https://render.com", "description": "클라우드 서비스 배포. 웹 서비스, DB, 크론 무료 tier.", "tags": ["hosting", "database", "deploy"]},
    {"name": "Fly.io", "category": "CI/CD", "url": "https://fly.io", "description": "엣지 배포 플랫폼. VMs와 Postgres 무료 tier.", "tags": ["edge", "deploy", "containers"]},
    {"name": "Replicate", "category": "AI/ML", "url": "https://replicate.com", "description": "AI 모델 실행 플랫폼. 오픈소스 모델 무료로 실행.", "tags": ["ai", "ml", "inference"]},
    {"name": "OpenAI API", "category": "AI/ML", "url": "https://openai.com/api", "description": "GPT 등 AI 모델 API. $5 무료 크레딧 제공.", "tags": ["ai", "gpt", "api"]},
    {"name": "Anthropic Claude", "category": "AI/ML", "url": "https://anthropic.com", "description": "AI 어시스턴트 API. 안전하고 유용한 AI.", "tags": ["ai", "claude", "api"]},
    {"name": "Groq", "category": "AI/ML", "url": "https://console.groq.com", "description": "초고속 AI 추론 API. 무료 tier 있음.", "tags": ["ai", "inference", "fast"]},
    {"name": "AWS Free Tier", "category": "Cloud", "url": "https://aws.amazon.com/free", "description": "Amazon 웹 서비스. 12개월 무료, 항상 무료 포함.", "tags": ["cloud", "compute", "storage"]},
    {"name": "Google Cloud", "category": "Cloud", "url": "https://cloud.google.com/free", "description": "GCP 무료 티어. $300 크레딧과 항상 무료 서비스.", "tags": ["cloud", "compute", "ml"]},
    {"name": "DigitalOcean", "category": "Cloud", "url": "https://www.digitalocean.com", "description": "간단한 클라우드. $200 무료 크레딧 60일.", "tags": ["cloud", "vps", "deploy"]},
    {"name": "PlanetScale", "category": "Database", "url": "https://planetscale.com", "description": "서버리스 MySQL. 무료 hobby tier 제공.", "tags": ["mysql", "database", "serverless"]},
    {"name": "Upstash", "category": "Database", "url": "https://upstash.com", "description": "서버리스 Redis. 일일 10K 명령어 무료.", "tags": ["redis", "cache", "serverless"]},
    {"name": "Neon", "category": "Database", "url": "https://neon.tech", "description": "서버리스 Postgres. 분기당 0.5GB 스토리지 무료.", "tags": ["postgres", "serverless", "branching"]}
];

let fuse = null;
let currentCategory = 'all';
let bookmarks = JSON.parse(localStorage.getItem('devtools-bookmarks') || '[]');

function initSearch() {
    fuse = new Fuse(services, {
        keys: ['name', 'category', 'description', 'tags'],
        threshold: 0.3,
        includeScore: true
    });
    renderServices(services);
}

function renderServices(results) {
    const container = document.getElementById('results');
    const countEl = document.getElementById('resultCount');
    
    if (!results.length) {
        container.innerHTML = '<p class="no-results">검색 결과가 없습니다.</p>';
        countEl.textContent = '0';
        return;
    }
    
    countEl.textContent = results.length;
    container.innerHTML = results.map((svc) => `
        <div class="service-card">
            <div class="service-header">
                <div>
                    <span class="service-name">
                        <a href="${svc.url}" target="_blank" rel="noopener">${svc.name}</a>
                    </span>
                    <span class="service-category">${svc.category}</span>
                </div>
                <button class="bookmark-btn ${bookmarks.includes(svc.name) ? 'active' : ''}" 
                        onclick="toggleBookmark('${svc.name}')" title="북마크">★</button>
            </div>
            <p class="service-description">${svc.description}</p>
            <div class="service-tags">
                ${svc.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
            </div>
        </div>
    `).join('');
}

function toggleBookmark(name) {
    const idx = bookmarks.indexOf(name);
    if (idx > -1) {
        bookmarks.splice(idx, 1);
    } else {
        bookmarks.push(name);
    }
    localStorage.setItem('devtools-bookmarks', JSON.stringify(bookmarks));
    renderServices(getFilteredResults());
}

function getFilteredResults() {
    const query = document.getElementById('searchInput').value.trim();
    
    if (!query) {
        if (currentCategory === 'all') return services;
        return services.filter(s => s.category === currentCategory);
    }
    
    let results = fuse.search(query).map(r => r.item);
    if (currentCategory !== 'all') {
        results = results.filter(s => s.category === currentCategory);
    }
    return results;
}

document.getElementById('searchInput').addEventListener('input', () => {
    renderServices(getFilteredResults());
});

document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderServices(getFilteredResults());
    });
});

initSearch();
</script>
</body>
</html>
